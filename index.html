<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BelinTM Skins Gallery</title>
<style>
  :root {
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
  }
  body {
    margin:0;
    padding:16px;
    background:#f6f7fb;
    color:#111
  }
  #status {
    margin-left:8px;
    font-size:13px;
    color:#444
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    grid-auto-rows: max-content;
    grid-gap: 12px;
    justify-content: start;
    align-items: start;
  }
  .card {
    background:#fff;
    padding:8px;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
    display: block;
    gap:8px;
    align-items:center;
  }
  .card img {
    width:100%;
    height:auto;
    max-height: none;
    object-fit: cover;
    border-radius:3px;
  }
  .card video {
    width:100%;
    height:auto;
    object-fit: contain;
    border-radius:3px;
    max-height: none;
    float: none;
  }
  a.path{font-size:12px;color:#0366d6;word-break:break-all;text-decoration:none}
</style>
</head>
<body>
  <div id="status" style="margin-left:12px"></div>
  <div id="gallery" class="grid"></div>
<script>
(async function(){
  const STATUS = document.getElementById('status');
  const GALLERY = document.getElementById('gallery');
  const imgRegex = /\.(png|jpe?g|webp|gif)$/i;
  const vidRegex = /\.(webm)$/i;

  function setStatus(t){
    STATUS.textContent = t || '';
  }

  function encodePath(path) {
    return path.split('/').map(encodeURIComponent).join('/');
  }

  async function apiCall(path) {
    const response = await fetch(path, { headers: { Accept: 'application/vnd.github.v3+json' }});
    if (!response.ok) throw new Error(`GitHub API ${r.status}`);
    return response.json();
  }

  async function fetchTree() {
    return apiCall('https://api.github.com/repos/belintm/signs/git/trees/main?recursive=1');
  }

  async function fetchLatestCommitSha() {
    return apiCall('https://api.github.com/repos/belintm/signs/commits?per_page=1&sha=main');
  }

  function render(list){
    GALLERY.innerHTML = '';
    for(const p of list) {
      const raw = `https://raw.githubusercontent.com/belintm/signs/main/${encodePath(p)}`;
      const card = document.createElement('div'); card.className='card';
      if(imgRegex.test(p)) {
        const img = document.createElement('img'); img.loading='lazy'; img.alt=p; img.src=raw;
        img.onerror = ()=> img.style.display='none';
        img.addEventListener('click', () => copyPathToClipboard(raw))
        card.appendChild(img);
      } else {
        const video = document.createElement('video'); video.autoplay=true; video.alt=p; video.src=raw; video.loop=true; video.muted=true;
        video.onerror = ()=> video.style.display='none';
        video.addEventListener('click', () => copyPathToClipboard(raw))
        card.appendChild(video)
      }
      const link = document.createElement('a'); link.className='path'; link.href=raw; link.target='_blank'; link.rel='noopener'; link.textContent=p;
      card.appendChild(link);
      GALLERY.appendChild(card);
    }
    setStatus("")
  }

  function copyPathToClipboard(path) {
    navigator.clipboard.writeText(path);
    alert(path + '\n\nPath copied to clipboard')
  }

  async function load() {
    setStatus("Loading assets...")
    GALLERY.innerHTML='';
    const cacheKey = 'skins';
    let latestCommitSha = '';
    try {
      const data = await fetchLatestCommitSha();
      if(data.length < 1) throw new Error("Latest commit not found !");
      latestCommitSha = data[0].sha;
    } catch(err) {
      alert('Error : '+err.message);
    }

    try {
      const cached = JSON.parse(localStorage.getItem(cacheKey)||'null');
      if (cached && (!latestCommitSha || cached.c === latestCommitSha)) {
        render(cached.list);
        return;
      }
    } catch(err) {
      alert('Error : '+err.message);
    }

    try {
      const data = await fetchTree();
      const tree = data.tree || [];
      const skins = tree.filter(n=>n.type==='blob' && (imgRegex.test(n.path) || vidRegex.test(n.path))).map(n=>n.path).sort();
      localStorage.setItem(cacheKey, JSON.stringify({c:latestCommitSha, list:skins}));
      render(skins);
    } catch(err){
      setStatus('Error : '+err.message);
    }
  }
  load();
})();
</script>
</body>
</html>
